name: Deploy Firestore rules

# Keep the deployed Firestore security rules and indexes in lockstep with the
# repo. Without this, edits to firebase/firestore.rules merge to master but only
# take effect in production once someone remembers to run `firebase deploy` by
# hand — exactly how the route_plans -> routes rename shipped to the repo but
# not to Firebase, breaking route imports with permission-denied in production.
#
# Required setup (in the kyuhachi-fddcc Google Cloud project):
#   - Secret FIREBASE_SERVICE_ACCOUNT: the full JSON key of a service account,
#     stored under Settings -> Secrets and variables -> Actions.
#   - That service account needs all THREE of these roles:
#       * roles/firebaserules.admin            (deploy firestore:rules)
#       * roles/datastore.indexAdmin           (deploy firestore:indexes)
#       * roles/serviceusage.serviceUsageConsumer
#           The Firebase CLI calls the Service Usage API to verify
#           firestore.googleapis.com is enabled before deploying; without this
#           role the deploy fails with a 403 on serviceusage.googleapis.com.
on:
  push:
    branches: [master]
    paths:
      - firebase/firestore.rules
      - firebase/firestore.indexes.json
  # Manual trigger: lets a maintainer re-deploy the current rules/indexes on
  # demand (e.g. to verify the service-account auth, or to push state that has
  # drifted) without having to touch a rules file.
  workflow_dispatch:

# Serialize deploys so two pushes in quick succession can't race each other to
# Firebase. cancel-in-progress is false so an in-flight deploy is never killed.
concurrency:
  group: deploy-firestore-rules
  cancel-in-progress: false

jobs:
  rules-test:
    name: Firestore rules tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: firebase/package-lock.json

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Install test dependencies
        run: npm ci
        working-directory: firebase

      - name: Run Firestore rules tests
        run: firebase emulators:exec --only firestore --project kyuhachi-test "npm test"
        working-directory: firebase

  deploy:
    name: Deploy rules + indexes
    needs: rules-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: firebase/package-lock.json

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      # Write the service-account JSON to a file and point
      # GOOGLE_APPLICATION_CREDENTIALS at it. The secret is passed via env (not
      # interpolated into the command) so the JSON never lands in the shell
      # history or logs. This replaces the deprecated FIREBASE_TOKEN auth.
      - name: Write service account credentials
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          if [ -z "$FIREBASE_SERVICE_ACCOUNT" ]; then
            echo "::error::FIREBASE_SERVICE_ACCOUNT secret is not set." >&2
            exit 1
          fi
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "$RUNNER_TEMP/firebase-service-account.json"

      # Runs from the repo root so firebase.json (which maps the rules/indexes to
      # firebase/firestore.*) is picked up.
      - name: Deploy Firestore rules and indexes
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-service-account.json
        run: firebase deploy --only firestore:rules,firestore:indexes --project kyuhachi-fddcc --non-interactive
