name: Deploy

on:
  push:
    branches: [master]

jobs:
  build-and-submit:
    name: EAS Build + TestFlight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Write GoogleService-Info.plist
        run: echo "${{ secrets.GOOGLE_SERVICE_INFO_PLIST_BASE64 }}" | base64 --decode > app/GoogleService-Info.plist

      - name: Build iOS (preview)
        run: eas build --platform ios --profile preview --non-interactive --wait
        working-directory: app

      - name: Submit to TestFlight
        run: eas submit --platform ios --profile production --latest --non-interactive
        working-directory: app
