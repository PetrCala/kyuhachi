name: Deploy

# Self-owned iOS pipeline: build on a GitHub macOS runner with fastlane and
# upload to TestFlight, instead of EAS's cloud build (whose free-tier monthly
# quota kept blocking deploys). kyuhachi is a public repo, so runner minutes are
# free. The app stays Expo-MANAGED: `app/ios` is gitignored and regenerated by
# `expo prebuild` on every run — native code is never committed. Signing creds
# arrive as base64 GitHub secrets decoded to files at build time (the same
# pattern already used for GoogleService-Info). See app/fastlane/Fastfile.
#
# eas.json / EXPO_TOKEN are intentionally kept as a fallback (and for
# `eas credentials` cert export / dev-client builds).

on:
  push:
    branches: [master]
  # Manual trigger: lets a maintainer run a verification build from any branch
  # (e.g. before merging this pipeline) without pushing to master.
  workflow_dispatch:

# Serialize deploys. A new push waits for the running deploy to finish rather
# than racing it; while one runs, a burst of pushes collapses to a single
# queued follow-up. cancel-in-progress is false so an in-flight build/submit is
# never killed midway. This prevents two overlapping runs from each resolving
# "the latest build" to the same binary (the ITMS-90189 redundant-upload bug).
concurrency:
  group: deploy-ios
  cancel-in-progress: false

jobs:
  build-and-submit:
    name: iOS Build + TestFlight (self-owned)
    runs-on: macos-26
    timeout-minutes: 90
    env:
      # Pin Xcode to a version present on the macos-26 image (mirrors the
      # Kiroku app). If the image's Xcode changes, update this path.
      DEVELOPER_DIR: /Applications/Xcode_26.1.1.app/Contents/Developer
      # `xcodebuild -showBuildSettings` is slow with many static pods; bump
      # fastlane's defaults so build_app doesn't time out reading settings.
      FASTLANE_XCODEBUILD_SETTINGS_TIMEOUT: "120"
      FASTLANE_XCODEBUILD_SETTINGS_RETRIES: "5"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      # Workspace install from the repo root (deps are hoisted; app/ has no
      # standalone node_modules). `expo prebuild` needs these.
      - name: Install dependencies
        run: npm ci

      # Ruby + bundler (fastlane, CocoaPods 1.16.2). Set up before prebuild so
      # `bundle exec pod install` is available; uses app/Gemfile + app/.ruby-version.
      - uses: ruby/setup-ruby@v1
        with:
          working-directory: app
          bundler-cache: true

      # Secret -> file. Value is passed via env (never interpolated into the
      # command) so it stays out of the logs. The plist must exist before
      # prebuild: app.config.js resolves "./GoogleService-Info.plist".
      - name: Write GoogleService-Info.plist
        env:
          GOOGLE_SERVICE_INFO_PLIST_BASE64: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST_BASE64 }}
        run: |
          if [ -z "$GOOGLE_SERVICE_INFO_PLIST_BASE64" ]; then
            echo "::error::GOOGLE_SERVICE_INFO_PLIST_BASE64 secret is not set." >&2
            exit 1
          fi
          printf '%s' "$GOOGLE_SERVICE_INFO_PLIST_BASE64" | base64 --decode > app/GoogleService-Info.plist

      - name: Write signing + App Store Connect credentials
        env:
          IOS_DIST_CERT_P12_BASE64: ${{ secrets.IOS_DIST_CERT_P12_BASE64 }}
          ASC_API_KEY_JSON_BASE64: ${{ secrets.ASC_API_KEY_JSON_BASE64 }}
        run: |
          for var in IOS_DIST_CERT_P12_BASE64 ASC_API_KEY_JSON_BASE64; do
            if [ -z "${!var}" ]; then
              echo "::error::$var secret is not set." >&2
              exit 1
            fi
          done
          printf '%s' "$IOS_DIST_CERT_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/dist_cert.p12"
          printf '%s' "$ASC_API_KEY_JSON_BASE64" | base64 --decode > "$RUNNER_TEMP/asc_api_key.json"

      # Regenerate the native iOS project. Runs plugins/withAllowNonModularIncludes,
      # which patches the Podfile — so pod install MUST come after this.
      # --no-install: deps are already installed at the root and pods run below.
      - name: Expo prebuild (iOS)
        working-directory: app
        run: npx expo prebuild --platform ios --no-install

      - name: Install pods
        working-directory: app
        run: bash scripts/pod-install.sh

      - name: Build and upload to TestFlight
        working-directory: app
        timeout-minutes: 60
        env:
          ASC_API_KEY_PATH: ${{ runner.temp }}/asc_api_key.json
          IOS_DIST_CERT_P12_PATH: ${{ runner.temp }}/dist_cert.p12
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          FASTLANE_APPLE_ID: ${{ secrets.FASTLANE_APPLE_ID }}
        run: bundle exec fastlane ios beta
